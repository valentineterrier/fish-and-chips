<!DOCTYPE html>
<html lang="fr">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>fisn and chips</title>
	<link rel="stylesheet" href="style.css">

	<style>
		body{
			max-width: 50rem;
			margin: auto;
		}

		.color{
			width: max-content;
		}

		.swatch{
			width: 2.54cm;
			aspect-ratio: 1;
		}

		.label{
			font-family: monospace;
			border-top: 1px solid #ccc;
			padding-top: 0.5em;
			margin-top: 0.5em;
		}

	</style>



</head>
<body>
	<img src="logo.svg" alt="Logo fish and chips">
	
	<section id="CharteGraphique">

		<article id="Couleur">
			<h1>Couleur</h1>

			<div class="color">
				<h3>«Vert»</h3>
				<div class="swatch" style="background: hsl(110, 37%, 68%);"></div>
				<p class="label">#9acc90</p>
				<p class="label">hsl(110, 37%, 68%)</p>
				<p class="label">rvb</p>
				<p class="label">cmjn</p>
			</div>

			<div class="color">
				<h3>«Noir»</h3>
				<div class="swatch" style="background: black;"></div>
				<p class="label">#9acc90</p>
				<p class="label">hsl(110, 37%, 68%)</p>
				<p class="label">rvb</p>
				<p class="label">cmjn</p>
			</div>

		</article>
	<!-- #Couleur -->

	</section>
	<!-- #CharteGraphique -->

</body>
</html>
